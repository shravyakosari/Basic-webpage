<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Web Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Welcome to My Web Page</h1>
    </header>

    <div class="container">
        <h2>About Me</h2>
        <p>
            Hello! I am learning Web Development.
            This webpage demonstrates HTML, CSS, and JavaScript basics.
        </p>

        <h2>Sample Image</h2>
        <img src="https://picsum.photos/300/200" alt="Sample Image">

        <h2>Useful Link</h2>
        <p>
            Visit
            <a href="https://www.w3schools.com" target="_blank">
                W3Schools
            </a>
            to learn web development.
        </p>

        <h2>JavaScript Interaction</h2>
        <button id="alertBtn">Click Me</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
